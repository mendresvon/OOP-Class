name: Doc Sync Gate

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

jobs:
  doc-sync:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Doc Sync Gate
        shell: pwsh
        run: |
          ./scripts/check-doc-sync.ps1 -BaseRef "HEAD~1"
